<div class="container-md">
    <img [src]="qr" alt="QR Code">
    <button class="btn" (click)="Enable2FA()">เปิด 2FA</button>
</div>

<div class="container-md text-center">
    <div class="card-profile">
        <div class="card-header">
            <div class="profile-img text-5xl">
                {{getLogoUser()}}
            </div>
            <div class="mt-3 d-flex justify-content-center flex-column align-items-center gap-1">
                <div class="text-4xl text-medium">{{stateService.user()?.FullName}}</div>
                <div class="profile-role">
                    <span class="text-xs">
                        {{stateService.user()?.Role == "BUYER" ? "บัญชีผู้ซื้อ" : "บัญชีผู้ขาย"}}
                    </span>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="text-start">
                <span class="text-2xl">สถานะและความปลอดภัย</span>
                <div class="d-flex justify-content-between setting-item">
                    <div class="d-flex align-items-center gap-4">
                        <div class="text-4xl text-muted icon-item">
                            <i class="fa-solid fa-universal-access"></i>
                        </div>
                        <div>
                            <div class="text-xl">
                                การยืนยันตัวตนผู้ขาย
                            </div>
                            <div class="text-sm">
                                ต้องยืนยันตัวตนก่อนเพื่อเริ่มเป็นผู้ขาย
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-primary">สมัครเป็นผู้ขาย</button>
                </div>

                <div class="d-flex justify-content-between setting-item">
                    <div class="d-flex align-items-center gap-4">
                        <div class="text-4xl text-muted icon-item">
                            <i class="fa-solid fa-universal-access"></i>
                        </div>
                        <div>
                            <div class="text-xl">
                                การยืนยันตัวตน 2 ชั้น (2FA)
                            </div>
                            <div class="text-sm">
                                แนะนำให้เปิดเพื่อความปลอดภัย
                            </div>
                        </div>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="switchCheckChecked"
                            [checked]="stateService.user()?.IsEnabled2FA" (click)="Toggle2FA($event)">
                    </div>
                </div>
            </div>

            <button class="btn btn-danger mt-2" (click)="LogOut()">ออกจากระบบ</button>

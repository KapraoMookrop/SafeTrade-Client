<div class="container-md d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card-login">
        <div class="card-header text-center">
            <div class="text-5xl font-bold text-primary">Safe Trade</div>
            <div class="text-lg text-muted mt-1">
                เปลี่ยนรหัสผ่านใหม่ของคุณ
            </div>
        </div>

        <div class="card-body mt-4">

            <div class="fade-slide">
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <div class="form-floating">
                        <input [type]="IsNewShowPassword ? 'text' : 'password'" class="form-control" placeholder="รหัสผ่าน"
                            [(ngModel)]="NewPassword" name="password">
                        <label for="password">รหัสผ่าน</label>
                        <i class="fa-regular toggle-password" [class]="IsNewShowPassword ? 'fa-eye' : 'fa-eye-slash'"
                            (click)="IsNewShowPassword = !IsNewShowPassword"></i>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <div class="form-floating">
                        <input [type]="IsConfirmPassword ? 'text' : 'password'" class="form-control" placeholder="ยืนยันรหัสผ่าน"
                            [(ngModel)]="ConfirmPassword" name="confirmPassword">
                        <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
                        <i class="fa-regular toggle-password" [class]="IsConfirmPassword ? 'fa-eye' : 'fa-eye-slash'"
                            (click)="IsConfirmPassword = !IsConfirmPassword"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-footer">
            <button class="btn btn-primary w-100" (click)="ChangePassword()">เปลี่ยนรหัสผ่าน</button>
        </div>
    </div>
</div>

<h2 class="swal2-title">เพิ่มข้อมูล</h2>

<div class="swal2-html-container">
    <input type="text" [(ngModel)]="name" class="swal2-input" placeholder="ชื่อ">
</div>

<div class="swal2-actions">
    <button class="swal2-cancel" (click)="close()">ยกเลิก</button>
    <button class="swal2-confirm" (click)="submit()">บันทึก</button>
</div>
